name: 🐛 Bug report
description: Report a problem with NexCompress
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Tap …
        3. See error
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device & Android version
      placeholder: "Pixel 7, Android 14"
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: File type / size (if relevant)
      placeholder: "12 MB PDF, 9 pages"
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Logcat output or screenshots, if available.
